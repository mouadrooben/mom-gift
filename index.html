<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-black-white">
    <!-- Theme Switcher -->
    <div class="theme-switcher">
        <button class="theme-btn active" data-theme="theme-black-white" title="Black & White">🖤</button>
        <button class="theme-btn" data-theme="theme-red-white" title="Red & White">❤️</button>
        <button class="theme-btn" data-theme="theme-red-black" title="Red & Black">🔴</button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <header>
            <h1>🎉 Happy Birthday Mom 🎉</h1>
            <p>Play the game to unlock a special message for you</p>
        </header>

        <!-- Game Section -->
        <div class="game-section">
            <div class="game-info">
                <p>Moves: <span id="moves">0</span></p>
                <p>Score: <span id="score">0</span>/16</p>
            </div>

            <div class="memory-grid" id="memoryGrid">
                <!-- Cards will be generated by JavaScript -->
            </div>

            <button class="reset-btn" onclick="resetGame()">Reset Game</button>
        </div>

        <!-- Win Popup -->
        <div class="popup hidden" id="winPopup">
            <div class="popup-content">
                <div class="letter-envelope" onclick="openLetter()">
                    <div class="envelope">
                        <div class="envelope-flap"></div>
                        <p>Press Me 💌</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Letter Modal -->
        <div class="modal hidden" id="letterModal">
            <div class="modal-content">
                <button class="close-btn" onclick="closeLetter()">&times;</button>
                <div class="letter-content" id="letterContent">
                    <!-- Letter will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
